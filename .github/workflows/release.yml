name: Release

# Triggered by pushing a tag that looks like v*, e.g. v2.0.0-alpha.3.
# Builds CLI and desktop artifacts for all 3 platforms in parallel,
# then uploads them to the matching GitHub Release.
#
# All release artifacts (CLI + desktop) receive Foundation Ed25519
# .sig files. macOS Gatekeeper and Windows SmartScreen still warn on
# first launch of the desktop bundles — those require an Apple
# Developer ID / Microsoft signing cert, which are separate from our
# Ed25519 signatures.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_VERSION: 1.94.1
  CACHE_VERSION: v1

jobs:
  # ── CLI binaries (all 3 platforms) ─────────────────────────
  build-cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: csq-linux-x86_64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: csq-macos-aarch64
            ext: ""
          # Cross-compile x86_64 from Apple Silicon — macos-13 (Intel)
          # runners are scarce and consistently fail to allocate.
          # macos-latest (arm64) ships with Xcode that supports both
          # arches, so `cargo build --target x86_64-apple-darwin` just
          # works after `rustup target add` (handled by the toolchain
          # action's `targets:` input).
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: csq-macos-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: csq-windows-x86_64.exe
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ env.CACHE_VERSION }}-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build --release -p csq-cli --target ${{ matrix.target }}
        timeout-minutes: 30

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/csq${{ matrix.ext }}" "dist/${{ matrix.artifact }}"
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            certutil -hashfile "${{ matrix.artifact }}" SHA256 | grep -v ":" | tr -d ' \r' > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" | awk '{print $1}' > "${{ matrix.artifact }}.sha256"
          fi

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  # ── Desktop artifacts (Tauri bundler, all 3 platforms) ────
  build-desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-desktop-${{ env.CACHE_VERSION }}-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux system deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: csq-desktop/package-lock.json

      - name: Install npm deps
        working-directory: csq-desktop
        run: npm ci

      - name: Build desktop
        working-directory: csq-desktop
        # TAURI_SIGNING_* env vars trigger `createUpdaterArtifacts:
        # true` in tauri.conf.json to emit `.app.tar.gz`,
        # `.AppImage.tar.gz`, and `-setup.nsis.zip` bundles alongside
        # the regular installers, each paired with a minisign `.sig`
        # file the updater plugin verifies on install.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build
        timeout-minutes: 45

      - name: Ad-hoc re-sign macOS .app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Tauri's bundler leaves the .app with a Mach-O linker
          # signature on the inner binary but NO Contents/_CodeSignature/
          # CodeResources seal on the bundle itself. Gatekeeper reads
          # this as "code has no resources but signature indicates
          # they must be present" and shows the user a misleading
          # "app is damaged" error.
          #
          # Re-sign with `codesign --force --deep --sign -` (ad-hoc)
          # to regenerate CodeResources. This is not a trusted
          # signature (no Apple Developer ID), so users on first
          # launch will still need to right-click → Open once —
          # but they'll see "developer cannot be verified" with a
          # working bypass instead of "damaged" with no bypass.
          APP_BUNDLE=$(find target/release/bundle/macos -maxdepth 2 -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "::error::no .app bundle found under target/release/bundle/macos/"
            exit 1
          fi
          echo "Re-signing: $APP_BUNDLE"
          codesign --force --deep --sign - "$APP_BUNDLE"
          codesign --verify --deep --strict "$APP_BUNDLE"
          echo "Signature verified."

          # Rebuild the DMG around the re-signed app so the DMG's
          # inner .app has the coherent signature. Tauri's DMG step
          # already ran (producing an unsigned DMG); we need to
          # re-create it with hdiutil around the now-signed .app.
          DMG_PATH=$(find target/release/bundle/dmg -maxdepth 2 -name "*.dmg" -type f | head -1)
          if [ -n "$DMG_PATH" ]; then
            echo "Rebuilding DMG: $DMG_PATH"
            TMP_DMG_DIR=$(mktemp -d)
            cp -R "$APP_BUNDLE" "$TMP_DMG_DIR/"
            # Add a symlink to /Applications so the drag-install UX
            # works the same as the Tauri-built DMG.
            ln -s /Applications "$TMP_DMG_DIR/Applications"
            rm "$DMG_PATH"
            hdiutil create \
              -volname "Code Session Quota" \
              -srcfolder "$TMP_DMG_DIR" \
              -ov \
              -format UDZO \
              "$DMG_PATH"
            rm -rf "$TMP_DMG_DIR"
            echo "DMG rebuilt at $DMG_PATH"
          fi

      - name: Collect desktop artifacts
        shell: bash
        run: |
          mkdir -p dist-desktop
          # Tauri outputs land under target/release/bundle/<format>/
          if [ "$RUNNER_OS" = "Linux" ]; then
            find target/release/bundle -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec cp {} dist-desktop/ \;
            # Updater bundle (AppImage-based) + its minisign signature.
            find target/release/bundle -type f \( -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \) -exec cp {} dist-desktop/ \;
          elif [ "$RUNNER_OS" = "macOS" ]; then
            find target/release/bundle -type f -name "*.dmg" -exec cp {} dist-desktop/ \;
            # Updater bundle (.app.tar.gz) + minisign signature.
            find target/release/bundle -type f \( -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) -exec cp {} dist-desktop/ \;
          elif [ "$RUNNER_OS" = "Windows" ]; then
            find target/release/bundle -type f \( -name "*.msi" -o -name "*.exe" \) -exec cp {} dist-desktop/ \;
            # NSIS setup is the updater path on Windows; MSI would
            # require separate `.msi.zip` packaging (not emitted by
            # default). NSIS ships both `-setup.exe` and its `.sig`.
            find target/release/bundle -type f \( -name "*-setup.exe.sig" -o -name "*-setup.nsis.zip" -o -name "*-setup.nsis.zip.sig" \) -exec cp {} dist-desktop/ \;
          fi
          # Rename installers to csq-desktop-<platform>.<ext>.
          # Updater bundles get a longer name so they stay
          # distinguishable from the `.dmg` / `.AppImage` installers
          # and the publish job can spot them for `latest.json`.
          cd dist-desktop
          for f in *; do
            case "$f" in
              *.app.tar.gz)       mv "$f" "csq-desktop-${{ matrix.platform }}.app.tar.gz" ;;
              *.app.tar.gz.sig)   mv "$f" "csq-desktop-${{ matrix.platform }}.app.tar.gz.sig" ;;
              *.AppImage.tar.gz)  mv "$f" "csq-desktop-${{ matrix.platform }}.AppImage.tar.gz" ;;
              *.AppImage.tar.gz.sig) mv "$f" "csq-desktop-${{ matrix.platform }}.AppImage.tar.gz.sig" ;;
              *-setup.nsis.zip)   mv "$f" "csq-desktop-${{ matrix.platform }}-setup.nsis.zip" ;;
              *-setup.nsis.zip.sig) mv "$f" "csq-desktop-${{ matrix.platform }}-setup.nsis.zip.sig" ;;
              *-setup.exe.sig)    mv "$f" "csq-desktop-${{ matrix.platform }}-setup.exe.sig" ;;
            esac
          done
          # Then rename the installers. Guard against colliding with
          # the updater bundles already renamed above — the ext check
          # on a trailing `.tar.gz` would collapse to `gz`.
          for f in *; do
            case "$f" in
              csq-desktop-*) continue ;;
              *.deb)       mv "$f" "csq-desktop-${{ matrix.platform }}.deb" ;;
              *.rpm)       mv "$f" "csq-desktop-${{ matrix.platform }}.rpm" ;;
              *.AppImage)  mv "$f" "csq-desktop-${{ matrix.platform }}.AppImage" ;;
              *.dmg)       mv "$f" "csq-desktop-${{ matrix.platform }}.dmg" ;;
              *.msi)       mv "$f" "csq-desktop-${{ matrix.platform }}.msi" ;;
              *.exe)       mv "$f" "csq-desktop-${{ matrix.platform }}.exe" ;;
            esac
          done
          # Compute SHA256 for installers only — `.sig` files from
          # the Tauri signer are themselves text and should not be
          # hashed for the SHA256SUMS file.
          for f in csq-desktop-*; do
            case "$f" in
              *.sig) continue ;;
            esac
            if [ -f "$f" ]; then
              if [ "$RUNNER_OS" = "Windows" ]; then
                certutil -hashfile "$f" SHA256 | grep -v ":" | tr -d ' \r' > "$f.sha256"
              else
                shasum -a 256 "$f" | awk '{print $1}' > "$f.sha256"
              fi
            fi
          done
          ls -la

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: dist-desktop/*
          if-no-files-found: error

  # ── Publish to GitHub Release ─────────────────────────────
  release:
    name: Publish release
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-latest-cargo-signer-${{ env.CACHE_VERSION }}-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build sign-release helper
        run: cargo build --release --bin sign-release -p csq-core
        timeout-minutes: 15

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging

      - name: Stage flattened assets
        run: |
          mkdir -p release-assets
          find staging -type f -exec cp {} release-assets/ \;
          # Build combined SHA256SUMS file
          cd release-assets
          if ls csq-* >/dev/null 2>&1; then
            for f in csq-*; do
              case "$f" in
                *.sha256) ;;
                *) echo "$(cat "${f}.sha256")  ${f}" >> SHA256SUMS ;;
              esac
            done
          fi
          # Remove per-file .sha256 (keep combined SHA256SUMS)
          rm -f *.sha256
          ls -la

      - name: Sign release artifacts with Foundation Ed25519 key
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          # Fail loudly if the secret is missing — better than
          # publishing unsigned artifacts that csq update install
          # will refuse anyway.
          if [ -z "$RELEASE_SIGNING_KEY" ]; then
            echo "::error::RELEASE_SIGNING_KEY secret not set on this repository"
            exit 1
          fi

          SIGNER="$GITHUB_WORKSPACE/target/release/sign-release"
          if [ ! -x "$SIGNER" ]; then
            echo "::error::sign-release binary not found at $SIGNER"
            exit 1
          fi

          cd release-assets

          # Sign each release artifact: CLI binaries and desktop bundles.
          # Excludes SHA256SUMS and pre-existing .sig/.sha256 files via
          # the filter below.
          shopt -s nullglob
          targets=(csq-linux-* csq-macos-* csq-windows-* csq-desktop-*)
          if [ ${#targets[@]} -eq 0 ]; then
            echo "::error::no release artifacts found to sign"
            exit 1
          fi

          # Filter out anything that's already a signature or checksum,
          # AND the updater bundles (*.tar.gz, *-setup.nsis.zip) — those
          # carry a Tauri minisign `.sig` produced at build time and
          # double-signing would collide on the output filename.
          to_sign=()
          for f in "${targets[@]}"; do
            case "$f" in
              *.sig|*.sha256) ;;
              *.tar.gz|*-setup.nsis.zip) ;;
              *) [ -f "$f" ] && to_sign+=("$f") ;;
            esac
          done

          if [ ${#to_sign[@]} -eq 0 ]; then
            echo "::error::no signable artifacts after filtering"
            exit 1
          fi

          # Pass the key as the first argument; subsequent args are files.
          # The signer reads the key from argv[1] then drops it before exit.
          "$SIGNER" "$RELEASE_SIGNING_KEY" "${to_sign[@]}"

          # Verify every binary now has a corresponding .sig file.
          for f in "${to_sign[@]}"; do
            if [ ! -f "$f.sig" ]; then
              echo "::error::missing signature for $f"
              exit 1
            fi
          done

          # Sign SHA256SUMS too — `csq update install` does not currently
          # consume this signature but it lets out-of-band verifiers
          # confirm the SHA256SUMS file is Foundation-attested.
          if [ -f SHA256SUMS ]; then
            "$SIGNER" "$RELEASE_SIGNING_KEY" SHA256SUMS
          fi

          # Defense-in-depth: clear the env var even though the step
          # ends here. GitHub masks the value in logs but the unset
          # makes the intent explicit.
          unset RELEASE_SIGNING_KEY

          ls -la

      - name: Generate latest.json for tauri-plugin-updater
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # tauri-plugin-updater polls an endpoint that returns a JSON
          # manifest keyed by `<os>-<arch>`; the plugin compares the
          # shipped binary version to `version` and — if newer —
          # downloads the per-platform URL, verifies the `signature`
          # (minisign format) against the pubkey baked into the app,
          # and swaps the bundle. Manifest is uploaded as
          # `latest.json` in the same release assets.
          #
          # Platforms we publish today: darwin-aarch64 (from macOS
          # runner), linux-x86_64, windows-x86_64. darwin-x86_64 is
          # intentionally omitted — the macOS runner is arm64 and we
          # don't cross-build desktop bundles. Intel Mac users on
          # the CLI path are unaffected.
          cd release-assets

          export VERSION="${TAG#v}"
          export PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export RELEASE_URL_BASE="https://github.com/terrene-foundation/csq/releases/download/${TAG}"

          read_sig() {
            # Minisign `.sig` files are short text blobs. Read them
            # verbatim so `latest.json` can embed them as a single
            # `signature` string the plugin validates at install time.
            local path="$1"
            if [ -f "$path" ]; then
              cat "$path"
            fi
          }

          export DARWIN_AARCH64_SIG="$(read_sig csq-desktop-macos.app.tar.gz.sig)"
          export LINUX_X86_64_SIG="$(read_sig csq-desktop-linux.AppImage.tar.gz.sig)"
          export WINDOWS_X86_64_SIG="$(read_sig csq-desktop-windows-setup.nsis.zip.sig)"

          # Build the manifest only from platforms whose updater
          # bundle + signature are both present. Missing pairs
          # reduce to an empty `platforms` branch — out-of-date
          # clients on that OS keep the banner but stay on the
          # manual download path rather than erroring.
          python3 <<'PY' > latest.json
          import json, os

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          pub_date = os.environ["PUB_DATE"]
          base = os.environ["RELEASE_URL_BASE"]

          platforms = {}
          sigs = {
              "darwin-aarch64": ("csq-desktop-macos.app.tar.gz", os.environ.get("DARWIN_AARCH64_SIG", "")),
              "linux-x86_64": ("csq-desktop-linux.AppImage.tar.gz", os.environ.get("LINUX_X86_64_SIG", "")),
              "windows-x86_64": ("csq-desktop-windows-setup.nsis.zip", os.environ.get("WINDOWS_X86_64_SIG", "")),
          }
          for key, (filename, sig) in sigs.items():
              if sig and os.path.exists(filename):
                  platforms[key] = {
                      "signature": sig,
                      "url": f"{base}/{filename}",
                  }

          manifest = {
              "version": version,
              "notes": f"csq {version} — see https://github.com/terrene-foundation/csq/releases/tag/{tag}",
              "pub_date": pub_date,
              "platforms": platforms,
          }
          print(json.dumps(manifest, indent=2))
          PY

          echo "--- generated latest.json ---"
          cat latest.json

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          fail_on_unmatched_files: true
