[loggers]
keys=root,governance,audit

[handlers]
keys=console,file

[formatters]
keys=standard,json

[logger_root]
level=INFO
handlers=console

[logger_governance]
level=DEBUG
handlers=console,file
qualname=governance

[logger_audit]
level=INFO
handlers=file
qualname=audit

[handler_console]
class=StreamHandler
formatter=standard
args=(sys.stdout,)

[handler_file]
class=FileHandler
formatter=json
args=('governance.log',)

[formatter_standard]
format=%(asctime)s [%(levelname)s] %(name)s: %(message)s

[formatter_json]
format={"time":"%(asctime)s","level":"%(levelname)s","logger":"%(name)s","message":"%(message)s"}
